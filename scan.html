<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recolector — ReciRetiro Smart</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #0f1a14; color: white; min-height: 100vh; }

    .rec-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .rec-header-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .rec-main {
      max-width: 440px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .scan-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      padding: 28px 20px;
      color: white;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 20px;
    }
    .scan-btn:hover { background: #2d8a5a; transform: translateY(-1px); }
    .scan-btn:active { transform: scale(0.98); }
    .scan-btn-icon { font-size: 2.4rem; line-height: 1; }
    .scan-btn-label { font-size: 1.05rem; font-weight: 700; }
    .scan-btn-sub { font-size: 0.78rem; opacity: 0.75; }

    .rec-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.25);
      font-size: 0.78rem;
    }
    .rec-divider::before,
    .rec-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .manual-box {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
    }
    .manual-box label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .manual-input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 11px 14px;
      color: white;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      outline: none;
      transition: border 0.15s;
      box-sizing: border-box;
    }
    .manual-input::placeholder { color: rgba(255,255,255,0.25); }
    .manual-input:focus { border-color: var(--accent); }

    .btn-confirm-manual {
      width: 100%;
      margin-top: 10px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 11px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-confirm-manual:hover { background: rgba(255,255,255,0.18); }

    /* Scanner area */
    #qr-reader { border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.15); margin-bottom: 12px; }
    #qr-reader img { display: none !important; }

    /* Pickup confirmation screen */
    .pickup-card {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 16px;
    }
    .pickup-card h3 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }
    .pickup-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.88rem;
      gap: 12px;
    }
    .pickup-row:last-child { border-bottom: none; }
    .pickup-label { color: rgba(255,255,255,0.45); flex-shrink: 0; }
    .pickup-value { font-weight: 600; text-align: right; }

    .btn-registrar {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 18px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-registrar:hover { background: #2d8a5a; }
    .btn-registrar:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-volver {
      width: 100%;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 13px;
      color: rgba(255,255,255,0.6);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 10px;
      transition: border-color 0.15s;
    }
    .btn-volver:hover { border-color: rgba(255,255,255,0.35); color: white; }

    .alert-dark-success {
      background: rgba(58,158,107,0.2);
      border: 1.5px solid rgba(58,158,107,0.4);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      color: #7ddba8;
      margin-bottom: 12px;
    }
    .alert-dark-error {
      background: rgba(192,57,43,0.2);
      border: 1.5px solid rgba(192,57,43,0.4);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      color: #f0908a;
      margin-bottom: 12px;
    }
    .alert-dark-warning {
      background: rgba(201,122,26,0.2);
      border: 1.5px solid rgba(201,122,26,0.35);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 0.85rem;
      color: #f0c080;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<!-- MINIMAL HEADER -->
<div class="rec-header">
  <div class="nav-logo-mark" style="width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:800; color:white; flex-shrink:0;">RR</div>
  <span class="rec-header-label">Modo Recolector</span>
</div>

<!-- SCANNER VIEW -->
<div id="scanner-view">
  <div class="rec-main">

    <button class="scan-btn" id="scan-camera-btn" onclick="startCamera()">
      <span class="scan-btn-icon">📷</span>
      <span class="scan-btn-label">Escanear código QR</span>
      <span class="scan-btn-sub">Toca para activar la cámara</span>
    </button>

    <div id="camera-area" style="display:none; margin-bottom:20px;">
      <div id="qr-reader"></div>
      <button onclick="stopCamera()" class="btn-volver" style="margin-top:8px;">Cancelar cámara</button>
    </div>

    <div id="scan-result"></div>

    <div class="rec-divider">o ingresa el código manualmente</div>

    <div class="manual-box">
      <label>Código del vecino</label>
      <input type="text" id="manual-code" class="manual-input" placeholder="REC-PROV-XXXX" autocomplete="off" autocorrect="off" spellcheck="false">
      <button onclick="searchManual()" class="btn-confirm-manual">Confirmar</button>
    </div>

  </div>
</div>

<!-- PICKUP VIEW -->
<div id="pickup-view" style="display:none;">
  <div class="rec-main">

    <div id="pickup-loading" style="text-align:center; padding:48px 0; color:rgba(255,255,255,0.4);">
      <div class="spinner" style="border-color:rgba(255,255,255,0.15); border-top-color:var(--accent);"></div>
      <p style="margin-top:12px; font-size:0.88rem;">Buscando vecino...</p>
    </div>

    <div id="pickup-content" style="display:none;">
      <div class="pickup-card">
        <h3>Vecino</h3>
        <div id="pickup-neighbor-info"></div>
      </div>

      <div class="pickup-card" id="pickup-history-card">
        <h3>Últimos retiros</h3>
        <div id="pickup-history"></div>
      </div>

      <div id="confirm-area">
        <div id="confirm-result"></div>
        <button id="confirm-btn" onclick="confirmPickup()" class="btn-registrar">
          ✓ Marcar como retirado
        </button>
        <button onclick="resetScanner()" class="btn-volver">← Escanear otro</button>
      </div>
    </div>

    <div id="pickup-not-found" style="display:none; text-align:center; padding:32px 0;">
      <div style="font-size:2rem; margin-bottom:12px;">🔍</div>
      <p style="font-weight:700; margin-bottom:6px;">Código no registrado</p>
      <p style="font-size:0.85rem; color:rgba(255,255,255,0.45);">Este código no se encuentra en el sistema.</p>
      <button onclick="resetScanner()" class="btn-volver" style="margin-top:20px;">← Volver</button>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);
  let currentNeighbor = null;
  let html5QrCode = null;

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('es-CL', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function extractCode(text) {
    const hashMatch = text.match(/#pickup\/([A-Z0-9\-]+)/);
    if (hashMatch) return hashMatch[1];
    const directMatch = text.match(/REC-PROV-\d+/);
    if (directMatch) return directMatch[0];
    return text.trim().toUpperCase();
  }

  function startCamera() {
    document.getElementById('scan-camera-btn').style.display = 'none';
    document.getElementById('camera-area').style.display = 'block';

    html5QrCode = new Html5Qrcode('qr-reader');
    html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      (decodedText) => {
        stopCamera();
        const code = extractCode(decodedText);
        loadPickupView(code);
      },
      () => {}
    ).catch(() => {
      document.getElementById('scan-result').innerHTML = '<div class="alert-dark-warning">No se pudo acceder a la cámara. Usa el ingreso manual.</div>';
      document.getElementById('camera-area').style.display = 'none';
      document.getElementById('scan-camera-btn').style.display = 'flex';
    });
  }

  function stopCamera() {
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {});
      html5QrCode = null;
    }
    document.getElementById('camera-area').style.display = 'none';
    document.getElementById('scan-camera-btn').style.display = 'flex';
  }

  function resetScanner() {
    currentNeighbor = null;
    document.getElementById('pickup-view').style.display = 'none';
    document.getElementById('scanner-view').style.display = 'block';
    document.getElementById('manual-code').value = '';
    document.getElementById('scan-result').innerHTML = '';
    window.location.hash = '';
  }

  async function loadPickupView(code) {
    document.getElementById('scanner-view').style.display = 'none';
    document.getElementById('pickup-view').style.display = 'block';
    document.getElementById('pickup-loading').style.display = 'block';
    document.getElementById('pickup-content').style.display = 'none';
    document.getElementById('pickup-not-found').style.display = 'none';

    const { data: neighbor, error } = await db.from('neighbors').select('*').eq('code', code).single();
    document.getElementById('pickup-loading').style.display = 'none';

    if (error || !neighbor) {
      document.getElementById('pickup-not-found').style.display = 'block';
      return;
    }

    currentNeighbor = neighbor;
    document.getElementById('pickup-content').style.display = 'block';

    document.getElementById('pickup-neighbor-info').innerHTML = `
      <div class="pickup-row"><span class="pickup-label">Código</span><span class="pickup-value" style="font-family:monospace; font-size:0.82rem;">${neighbor.code}</span></div>
      <div class="pickup-row"><span class="pickup-label">Nombre</span><span class="pickup-value">${neighbor.name} ${neighbor.last_name}</span></div>
      <div class="pickup-row"><span class="pickup-label">Dirección</span><span class="pickup-value">${neighbor.address}${neighbor.apartment ? ', ' + neighbor.apartment : ''}</span></div>
      <div class="pickup-row"><span class="pickup-label">Sector</span><span class="pickup-value">${neighbor.sector}</span></div>
    `;

    const { data: pickups } = await db.from('pickups').select('*')
      .eq('neighbor_code', code).order('pickup_date', { ascending: false }).limit(3);

    if (!pickups || pickups.length === 0) {
      document.getElementById('pickup-history').innerHTML = '<p style="font-size:0.82rem; color:rgba(255,255,255,0.35);">Sin retiros previos.</p>';
    } else {
      document.getElementById('pickup-history').innerHTML = pickups.map(p => `
        <div class="pickup-row">
          <span class="pickup-label">${formatDate(p.pickup_date)}</span>
          <span class="pickup-value" style="color:rgba(58,158,107,0.9); font-size:0.82rem;">✓ Retirado</span>
        </div>`).join('');
    }

    // Reset confirm button
    const btn = document.getElementById('confirm-btn');
    btn.disabled = false;
    btn.textContent = '✓ Marcar como retirado';
    document.getElementById('confirm-result').innerHTML = '';
  }

  async function confirmPickup() {
    if (!currentNeighbor) return;
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true;
    btn.textContent = 'Registrando...';

    const today = new Date().toISOString().split('T')[0];
    const { error } = await db.from('pickups').insert([{
      neighbor_code: currentNeighbor.code,
      pickup_date: today,
      status: 'picked_up',
      bags: 1
    }]);

    if (error) {
      document.getElementById('confirm-result').innerHTML = '<div class="alert-dark-error">Error al registrar. Intenta nuevamente.</div>';
      btn.disabled = false;
      btn.textContent = '✓ Marcar como retirado';
      return;
    }

    document.getElementById('confirm-result').innerHTML = `
      <div class="alert-dark-success">✓ Retiro registrado — ${currentNeighbor.name} ${currentNeighbor.last_name}</div>
    `;
    btn.style.display = 'none';
  }

  function searchManual() {
    const raw = document.getElementById('manual-code').value.trim();
    if (!raw) return;
    const code = extractCode(raw);
    loadPickupView(code);
  }

  document.getElementById('manual-code').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchManual();
  });

  // Check URL hash on load
  const hash = window.location.hash;
  if (hash && hash.startsWith('#pickup/')) {
    const code = hash.replace('#pickup/', '').trim();
    if (code) loadPickupView(code);
  }
</script>

</body>
</html>

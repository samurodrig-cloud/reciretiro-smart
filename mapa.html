<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puntos Limpios — ReciRetiro Smart</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .map-wrapper {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark">RR</div>
    ReciRetiro Smart
  </a>
  <div class="nav-links">
    <a href="register.html">Registrarse</a>
    <a href="beneficios.html">Beneficios</a>
    <a href="mapa.html">Puntos limpios</a>
    <a href="panel.html" id="nav-perfil-btn" style="display:none;">👤 Mi perfil</a>
    <a href="dashboard.html">Panel Municipal</a>
  </div>
</nav>

<div id="map-fallback" style="display:none; text-align:center; padding: 80px 24px;">
  <h2 style="margin-bottom: 12px;">El mapa no pudo cargarse</h2>
  <p style="color: var(--gray-dark); margin-bottom: 24px; font-size: 0.95rem;">El sitio externo no está disponible en este momento.</p>
  <a href="https://santiagorecicla.mma.gob.cl/mapa/" target="_blank" class="btn btn-primary btn-lg">
    Abrir mapa en nueva pestaña
  </a>
</div>

<iframe
  id="map-frame"
  src="https://santiagorecicla.mma.gob.cl/mapa/"
  class="map-wrapper"
  title="Puntos limpios de Santiago — Ministerio del Medio Ambiente"
  allowfullscreen
  onload="checkMapLoad(this)"
  onerror="showFallback()">
</iframe>

<script>
  function showFallback() {
    document.getElementById('map-frame').style.display = 'none';
    document.getElementById('map-fallback').style.display = 'block';
  }

  function checkMapLoad(iframe) {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc || doc.body.innerHTML === '') showFallback();
    } catch(e) {
      // cross-origin — significa que cargó pero no podemos leerlo, lo cual es correcto
    }
  }

  setTimeout(() => {
    const frame = document.getElementById('map-frame');
    if (frame.style.display === 'none') return;
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if (doc && doc.title === '') showFallback();
    } catch(e) {}
  }, 6000);
</script>

<script>
  (function(){
    var c = localStorage.getItem('reciretiro_code');
    if (c) { var el = document.getElementById('nav-perfil-btn'); if (el) { el.style.display = 'inline-flex'; el.href = 'panel.html?code=' + c; } }
  var logo = document.querySelector('.nav-logo'); if (logo) logo.addEventListener('dblclick', function(){ window.location.href = 'recolector.html'; });
  })();
</script>
</body>
</html>
